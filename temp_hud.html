                <!-- HUD superior (Global) -->
                <div class="hud-top-bar" id="hud-top-bar">
                    <div class="hud-left-group">
                        <div class="clock-session clock-horizontal" style="padding: 2px 10px; gap: 8px; display: flex; align-items: baseline;">
                            <div class="clock-label" style="margin-top: 0">HORA</div>
                            <div id="clock" style="font-weight: bold; font-size: 1.2em;">00:00</div>
                        </div>

                        <div class="hud-sensor-bar">
                            <div class="indicator-icon" id="indicator-PWR" title="Potencia">PWR</div>
                            <div class="indicator-icon" id="indicator-HR" title="Pulso">HR</div>
                            <div class="indicator-icon" id="indicator-CAD" title="Cadencia">CAD</div>
                            <div class="indicator-icon" id="indicator-SPD" title="Velocidad">SPD</div>
                        </div>
                    </div>

                    <div class="hud-right-group">
                        <div class="hud-font-selector clock-session" style="pointer-events: auto; display: flex; gap: 4px; align-items: center;">
                            <span style="font-size: 9px; font-weight: 700; color: var(--text-secondary); margin-right: 2px;">TEXTO</span>
                            <button class="btn-font-scale" data-scale="sm" style="background: none; border: 1px solid var(--glass-border); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: all 0.2s;">A-</button>
                            <button class="btn-font-scale active" data-scale="md" style="background: none; border: 1px solid var(--glass-border); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s;">A</button>
                            <button class="btn-font-scale" data-scale="lg" style="background: none; border: 1px solid var(--glass-border); color: white; padding: 2px 6px; border-radius: 4px; font-size: 14px; cursor: pointer; transition: all 0.2s;">A+</button>
                        </div>

                        <div class="metric-group">
                            <div class="metric-main">
                                <span class="metric-value" id="metrics-power">0</span>
                                <span class="metric-label">W</span>
                            </div>
                            <div class="metric-avg" id="metrics-power-avg">0 Ø</div>
                        </div>
                        <div class="metric-main">
                            <span class="metric-value" id="metrics-cadence">0</span>
                            <span class="metric-label">RPM</span>
                        </div>
                        <div class="metric-group">
                            <div class="metric-main">
                                <span class="metric-value speed-main" id="metrics-speed">0.0</span>
                                <span class="metric-label">km/h</span>
                            </div>
                            <div class="metric-avg" id="metrics-speed-avg">0.0 Ø</div>
                        </div>
                        <div class="metric-group">
                            <div class="metric-main">
                                <span class="metric-value" id="metrics-hr" style="color: #ff6666">0</span>
                                <span class="metric-label">BPM</span>
                            </div>
                            <div class="metric-avg" id="metrics-hr-avg">0 Ø</div>
                        </div>

                        <div class="clock-session clock-horizontal clock-session-time">
                            <div class="clock-label accent">TIEMPO</div>
                            <div id="workout-timer">00:00:00</div>
                        </div>
                    </div>
                </div>
